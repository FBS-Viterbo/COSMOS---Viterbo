<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../dist/output.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__wrapper">
          <div class="header__logo">
            <img src="../img/logo.png" alt="" />
            <span>COSMOS</span>
          </div>

          <!-- burger -->
          <button class="header__burger">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav class="header__nav">
            <ul>
              <li><a class="active" href="#">Home</a></li>
              <li><a href="#">Missions</a></li>
              <li><a href="#">Spacecraft</a></li>
              <li><a href="#">Gallery</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- banner -->
    <section
      class="banner flex items-center justify-center text-center min-h-[90vh]"
    >
      <div class="container">
        <div class="banner__wrapper flex flex-col items-center gap-5">
          <button class="btn btn--third">
            <img src="../img/logo.png" alt="icon" />
            <span> Exploring the Unknown </span>
          </button>
          <h1
            class="title bg-gradient-to-r from-white via-pink-300 to-pink-500 bg-clip-text text-transparent"
          >
            Journey Beyond the Stars
          </h1>
          <p class="text--secondary">
            Discover the next generation of space exploration. From Mars
            missions to deep space telescopes, we're pushing the boundaries of
            human knowledge.
          </p>
          <div class="controls flex items-center gap-4 mt-6">
            <button class="btn btn--primary">View Missions</button>
            <button class="btn btn--secondary">Our Fleet</button>
          </div>
        </div>
      </div>
    </section>

    <script src="../js/headerNav.js"></script>
    <script src="../js/burger.js"></script>
  </body>
</html>
